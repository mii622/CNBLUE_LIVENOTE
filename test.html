<!DOCTYPE html>

.wrapper{

  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{

  display:block;
}

/* 座標確認用 */

  background:red;
  opacity:0.6;
  border:1px solid #fff;
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

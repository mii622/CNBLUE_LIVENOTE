<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ座標テスト</title>

<style>

  margin:20px;
  font-family:sans-serif;
}

h2{
  text-align:center;
}

.wrapper{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* 座標確認用 */
.card{
  position:absolute;
  width:5%;
  height:12%;
  background:red;
  opacity:0.6;
  border:1px solid #fff;
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

<img src="bandkingdom.jpg" alt="トレカ">

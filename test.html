<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ管理ツール</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
  color:#222;
}

/* タイトル */
h2{
  text-align:center;
  font-size:20px;
  font-weight:700;
  margin:20px 0 10px;
  letter-spacing:1px;
}

/* 説明 */
.subtext{
  max-width:900px;
  margin:0 auto 15px;
  padding:12px 14px;
  border-radius:10px;
  background:#ffffff;
  font-size:13px;
  line-height:1.6;
  color:#333;
  width:calc(100% - 40px);
  box-sizing:border-box;
}

/* ボタン */
.btn-area{
  text-align:center;
  margin-bottom:20px;
}

#saveBtn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

#saveBtn:hover{
  opacity:0.85;
}

/* トレカエリア */
.wrapper{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* カード */
.card{
  position:absolute;
  width:8%;
  height:16%;
  background:transparent;
  cursor:pointer;
}

/* ラベル */
.mark{
  padding:2px 8px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  color:#fff;
  white-space:nowrap;
}

.give{ background:#e53935; }
.want{ background:#1e88e5; }

/* 上段 */
.top-card .mark{
  position:absolute;
  right:0px;
  top:-18px;
}

/* 下段 */
.bottom-card .mark{
  position:absolute;
  right:2px;
  bottom:-18px;
}

</style>
</head>

<body>

<h2>トレカ管理ツール</h2>

<div class="subtext">
① カードをタップで「譲 → 求 → 解除」切り替え<br>
② 状態はそのまま画像に反映されます<br>
③ 交換用スクショ作成に使えます
</div>

<div class="btn-area">
  <button id="saveBtn">画像として保存</button>
</div>

<div class="wrapper">

<img src="bandkingdom.jpg" alt="トレカ">

<!-- 上段 1～11（そのまま維持） -->
<div class="card top-card" style="left:7.5%; top:16%;"></div>
<div class="card top-card" style="left:15.5%; top:16%;"></div>
<div class="card top-card" style="left:23.5%; top:16%;"></div>
<div class="card top-card" style="left:31.5%; top:16%;"></div>
<div class="card top-card" style="left:39.5%; top:16%;"></div>

<div class="card top-card" style="left:47.5%; top:16%;"></div>
<div class="card top-card" style="left:55.5%; top:16%;"></div>

<div class="card top-card" style="left:62.5%; top:16%;"></div>
<div class="card top-card" style="left:70.5%; top:16%;"></div>
<div class="card top-card" style="left:78.5%; top:16%;"></div>
<div class="card top-card" style="left:86.5%; top:16%;"></div>

<!-- 下段 12～20（そのまま維持） -->
<div class="card bottom-card" style="left:14.5%; top:54%;"></div>
<div class="card bottom-card" style="left:22.5%; top:54%;"></div>
<div class="card bottom-card" style="left:30.5%; top:54%;"></div>
<div class="card bottom-card" style="left:38.5%; top:54%;"></div>

<div class="card bottom-card" style="left:46.5%; top:54%;"></div>
<div class="card bottom-card" style="left:54.5%; top:54%;"></div>
<div class="card bottom-card" style="left:62.5%; top:54%;"></div>
<div class="card bottom-card" style="left:70.5%; top:54%;"></div>

<div class="card bottom-card" style="left:78.5%; top:54%;"></div>

</div>

<script>
/* カード状態 */
document.querySelectorAll('.card').forEach(card => {

  card.dataset.state = "0";

  card.addEventListener('click', () => {

    let state = Number(card.dataset.state);
    state = (state + 1) % 3;

    card.dataset.state = state;
    card.innerHTML = '';

    if(state === 1){
      const mark = document.createElement('span');
      mark.className = 'mark give';
      mark.textContent = '譲';
      card.appendChild(mark);
    }

    if(state === 2){
      const mark = document.createElement('span');
      mark.className = 'mark want';
      mark.textContent = '求';
      card.appendChild(mark);
    }

  });

});

/* 画像保存 */
document.getElementById('saveBtn').addEventListener('click', async () => {

  const target = document.querySelector('.wrapper');

  const canvas = await html2canvas(target, {
    backgroundColor: null,
    scale: window.devicePixelRatio * 2
  });

  const link = document.createElement('a');
  link.download = 'tradingcards.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ座標テスト</title>

<style>
body{
  margin:20px;
  font-family:sans-serif;
}

h2{
  text-align:center;
}

.wrapper{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* 座標確認用 */
.card{
  position:absolute;
  width:6%;
  height:18%;
  background:red;
  opacity:0.6;
  border:1px solid #fff;
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

<img src="bandkingdom.jpg" alt="トレカ">

<!-- 上段 1～11 -->

<div class="card" style="left:5%; top:8%;">1</div>
<div class="card" style="left:13%; top:8%;">2</div>
<div class="card" style="left:21%; top:8%;">3</div>
<div class="card" style="left:29%; top:8%;">4</div>
<div class="card" style="left:37%; top:8%;">5</div>

<div class="card" style="left:45%; top:8%;">6</div>
<div class="card" style="left:53%; top:8%;">7</div>
<div class="card" style="left:61%; top:8%;">8</div>

</div>

</html>

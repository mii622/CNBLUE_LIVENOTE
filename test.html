<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グッズ交換ジェネレーター（安定版）</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
}

/* ===== UI ===== */
h2{
  text-align:center;
  margin:20px 0 10px;
}

.subtext{
  max-width:700px;
  margin:0 auto 15px;
  padding:14px;
  background:#fff;
  border-radius:12px;
  font-size:13px;
}

.btn-area{
  text-align:center;
  margin-bottom:20px;
}

.saveBtn{
  padding:10px 16px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* =========================
   ★ここがプロ設計の核
========================= */

/* セクション */
.item-section{
  max-width:900px;
  margin:40px auto;
  position:relative;
}

/* タイトル */
.section-title{
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  background:rgba(255,255,255,0.85);
  padding:4px 10px;
  border-radius:8px;
  font-size:13px;
}

/* 保存対象 */
.capture-area{
  position:relative;
  width:100%;

  /* ★重要：ここが基準固定 */
  aspect-ratio: 3 / 2;  /* ←ここで画像比率固定 */
  overflow:hidden;
}

/* 画像は必ずフィット */
.capture-area img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* カード（座標の基準はcapture-area） */
.card{
  position:absolute;
  width:8%;
  height:16%;
  cursor:pointer;
}

/* ラベル */
.mark{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:12px;
  font-weight:bold;
  color:#fff;
  padding:2px 8px;
  border-radius:12px;
}

.give{ background:#e53935; }
.want{ background:#1e88e5; }

</style>
</head>

<body>

<h2>グッズ交換ジェネレーター</h2>

<div class="subtext">
タップで譲→求→クリア / セクションごとに保存可能
</div>

<div class="btn-area">
  <button class="saveBtn">画像を保存</button>
</div>

<!-- ================= トレカ ================= -->
<div class="item-section">

  <div class="section-title">トレカ</div>

  <div class="capture-area">

    <img src="bandkingdom.jpg" crossorigin="anonymous">

    <div class="card" style="left:10%; top:20%;"></div>
    <div class="card" style="left:20%; top:20%;"></div>
    <div class="card" style="left:30%; top:20%;"></div>

  </div>
</div>

<!-- ================= JS ================= -->
<script>

/* カード状態 */
document.querySelectorAll('.card').forEach(card => {

  card.dataset.state = "0";

  card.addEventListener('click', () => {

    let s = (Number(card.dataset.state) + 1) % 3;
    card.dataset.state = s;

    card.innerHTML = '';

    if(s === 1){
      const m = document.createElement('span');
      m.className = 'mark give';
      m.textContent = '譲';
      card.appendChild(m);
    }

    if(s === 2){
      const m = document.createElement('span');
      m.className = 'mark want';
      m.textContent = '求';
      card.appendChild(m);
    }

  });

});

/* 保存 */
document.querySelectorAll('.saveBtn').forEach(btn => {

  btn.addEventListener('click', async () => {

    const section = btn.closest('.item-section');
    const target = section.querySelector('.capture-area');

    const canvas = await html2canvas(target, {
      scale: window.devicePixelRatio * 2,
      useCORS: true,
      backgroundColor: null
    });

    const link = document.createElement('a');
    link.download = 'goods.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

  });

});

</script>

</body>
</html>

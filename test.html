<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ座標テスト</title>

<style>
body{
  margin:20px;
  font-family:sans-serif;
}

h2{
  text-align:center;
}

.wrapper{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* 座標確認用 */
.card{
  position:absolute;
  width:8%;
  height:16%;

  background:transparent;
  cursor:pointer;
}
  .mark{
  padding:2px 8px;
  border-radius:12px;

  font-size:12px;
  font-weight:bold;

  color:#fff;
  white-space:nowrap;
}

.give{
  background:#e53935;
}

.want{
  background:#1e88e5;
}

/* 上段は右上 */

.top-card .mark{
  position:absolute;
  right:0px;
  top:-18px;
}

/* 下段は右下 */

.bottom-card .mark{
  position:absolute;
  right:2px;
  bottom:-18px;
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

<img src="bandkingdom.jpg" alt="トレカ">

<!-- 上段 1～11 -->

<div class="card top-card" style="left:7.5%; top:16%;"></div>
<div class="card top-card" style="left:15.5%; top:16%;"></div>
<div class="card top-card" style="left:23.5%; top:16%;"></div>
<div class="card top-card" style="left:31.5%; top:16%;"></div>
<div class="card top-card" style="left:39.5%; top:16%;"></div>

<div class="card top-card" style="left:47.5%; top:16%;"></div>
<div class="card top-card" style="left:55.5%; top:16%;"></div>

<div class="card top-card" style="left:62.5%; top:16%;"></div>
<div class="card top-card" style="left:70.5%; top:16%;"></div>
<div class="card top-card" style="left:78.5%; top:16%;"></div>
<div class="card top-card" style="left:86.5%; top:16%;"></div>

<!-- 下段 12～20 -->
<div class="card bottom-card" style="left:14.5%; top:54%;"></div>
<div class="card bottom-card" style="left:22.5%; top:54%;"></div>
<div class="card bottom-card" style="left:30.5%; top:54%;"></div>
<div class="card bottom-card" style="left:38.5%; top:54%;"></div>

<div class="card bottom-card" style="left:46.5%; top:54%;"></div>
<div class="card bottom-card" style="left:54.5%; top:54%;"></div>
<div class="card bottom-card" style="left:62.5%; top:54%;"></div>
<div class="card bottom-card" style="left:70.5%; top:54%;"></div>

<div class="card bottom-card" style="left:78.5%; top:54%;"></div>
</div>
<script>
document.querySelectorAll('.card').forEach(card => {

  let state = 0;

  card.addEventListener('click', () => {

    state++;

    if(state > 2){
      state = 0;
    }

    card.innerHTML = '';

    if(state === 1){

      const mark = document.createElement('span');

      mark.className = 'mark give';
      mark.textContent = '譲';

      card.appendChild(mark);
    }

    if(state === 2){

      const mark = document.createElement('span');

      mark.className = 'mark want';
      mark.textContent = '求';

      card.appendChild(mark);
    }

  });

});
</script>
</body>
</html>

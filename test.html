<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOODS CALCULATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: #0b1b2b;
  color: #fff;
}

.wrap {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 商品カード */
.item {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  transition: 0.2s;
}

.item:hover {
  background: rgba(255,255,255,0.1);
}

/* チェック */
.item input {
  transform: scale(1.2);
  margin-right: 12px;
}

/* 左側情報 */
.info {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.name {
  font-size: 15px;
  font-weight: bold;
}

.sub {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 3px;
}

/* 価格 */
.price {
  font-weight: bold;
  opacity: 0.9;
}

/* 合計 */
.total {
  margin-top: 20px;
  padding: 16px;
  text-align: center;
  background: #142b45;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  position: sticky;
  bottom: 10px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">GOODS CALCULATOR</div>

  <div class="list">

    <label class="item">
      <input type="checkbox" data-price="5000">
      <div class="info">
        <div class="name">Tシャツ</div>
        <div class="sub">2025 TOUR / BLACK</div>
      </div>
      <div class="price">¥5,000</div>
    </label>

    <label class="item">
      <input type="checkbox" data-price="3500">
      <div class="info">
        <div class="name">タオル</div>
        <div class="sub">LOGO DESIGN</div>
      </div>
      <div class="price">¥3,500</div>
    </label>

    <label class="item">
      <input type="checkbox" data-price="1200">
      <div class="info">
        <div class="name">アクキー</div>
        <div class="sub">TOUR LOGO</div>
      </div>
      <div class="price">¥1,200</div>
    </label>

    <label class="item">
      <input type="checkbox" data-price="6000">
      <div class="info">
        <div class="name">ペンライト</div>
        <div class="sub">OFFICIAL LIGHT</div>
      </div>
      <div class="price">¥6,000</div>
    </label>

  </div>

  <div class="total">
    TOTAL：<span id="total">0</span>円
  </div>

</div>

<script>
const checkboxes = document.querySelectorAll('input[type="checkbox"]');
const totalEl = document.getElementById('total');

function updateTotal() {
  let total = 0;

  checkboxes.forEach(cb => {
    if (cb.checked) {
      total += Number(cb.dataset.price);
    }
  });

  totalEl.textContent = total.toLocaleString();
}

checkboxes.forEach(cb => {
  cb.addEventListener('change', updateTotal);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOODS CALCULATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: #0b1b2b;
  color: #fff;
}

.wrap {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* 商品カード */
.card {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.card-title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* バリエーション */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 8px 0;
}

.label {
  font-size: 14px;
  opacity: 0.9;
}

.price {
  font-size: 12px;
  opacity: 0.6;
  margin-left: 6px;
}

/* 数量コントロール */
.counter {
  display: flex;
  align-items: center;
  gap: 6px;
}

button {
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 6px;
  background: #1d3b5a;
  color: #fff;
  font-size: 16px;
}

input[type="number"] {
  width: 50px;
  text-align: center;
  border-radius: 6px;
  border: none;
  padding: 4px;
}

/* 合計 */
.total {
  margin-top: 20px;
  padding: 16px;
  text-align: center;
  background: #142b45;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  position: sticky;
  bottom: 10px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">GOODS CALCULATOR</div>

  <!-- Tシャツ -->
  <div class="card">
    <div class="card-title">Tシャツ</div>

    <div class="row">
      <div>
        <span class="label">WHITE</span>
        <span class="price">¥5,000</span>
      </div>

      <div class="counter">
        <button onclick="changeQty(this, -1, 5000)">−</button>
        <input type="number" value="0" min="0" data-price="5000" oninput="calc()">
        <button onclick="changeQty(this, 1, 5000)">＋</button>
      </div>
    </div>

    <div class="row">
      <div>
        <span class="label">BLACK</span>
        <span class="price">¥5,000</span>
      </div>

      <div class="counter">
        <button onclick="changeQty(this, -1, 5000)">−</button>
        <input type="number" value="0" min="0" data-price="5000" oninput="calc()">
        <button onclick="changeQty(this, 1, 5000)">＋</button>
      </div>
    </div>
  </div>

  <!-- タオル -->
  <div class="card">
    <div class="card-title">タオル</div>

    <div class="row">
      <div>
        <span class="label">LOGO</span>
        <span class="price">¥3,500</span>
      </div>

      <div class="counter">
        <button onclick="changeQty(this, -1, 3500)">−</button>
        <input type="number" value="0" min="0" data-price="3500" oninput="calc()">
        <button onclick="changeQty(this, 1, 3500)">＋</button>
      </div>
    </div>
  </div>

  <!-- アクキー -->
  <div class="card">
    <div class="card-title">アクリルキーホルダー</div>

    <div class="row">
      <div>
        <span class="label">TOUR

          <div class="total">
  TOTAL：<span id="total">0</span>円
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  function calc() {
    let total = 0;

    document.querySelectorAll('input[type="number"]').forEach(input => {
      const qty = Number(input.value || 0);
      const price = Number(input.dataset.price || 0);
      total += qty * price;
    });

    const el = document.getElementById('total');
    if (el) el.textContent = total.toLocaleString();
  }

  document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener("input", calc);
  });

  window.changeQty = function(btn, diff) {
    const input = btn.parentElement.querySelector('input');
    let val = Number(input.value || 0);
    val = Math.max(0, val + diff);
    input.value = val;
    calc();
  };

  calc();
});
</script>

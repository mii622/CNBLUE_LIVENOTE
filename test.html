<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ座標テスト</title>

<style>
body{
  margin:20px;
  font-family:sans-serif;
}

h2{
  text-align:center;
}

.wrapper{
  position:relative;
  width:100%;
  max-width:900px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* 座標確認用 */
.card{
  position:absolute;
  width:8%;
  height:16%;

  background:transparent;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:bold;
  color:white;

  cursor:pointer;
}

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

<img src="bandkingdom.jpg" alt="トレカ">

<!-- 上段 1～11 -->

<div class="card" style="left:7.5%; top:16%;">1</div>
<div class="card" style="left:15.5%; top:16%;">2</div>
<div class="card" style="left:23.5%; top:16%;">3</div>
<div class="card" style="left:31.5%; top:16%;">4</div>
<div class="card" style="left:39.5%; top:16%;">5</div>

<div class="card" style="left:47.5%; top:16%;">6</div>
<div class="card" style="left:55.5%; top:16%;">7</div>

<div class="card" style="left:62.5%; top:16%;">8</div>
<div class="card" style="left:70.5%; top:16%;">9</div>
<div class="card" style="left:78.5%; top:16%;">10</div>
<div class="card" style="left:86.5%; top:16%;">11</div>

<!-- 下段 12～20 -->

<div class="card" style="left:14.5%; top:54%;">12</div>
<div class="card" style="left:22.5%; top:54%;">13</div>
<div class="card" style="left:30.5%; top:54%;">14</div>
<div class="card" style="left:38.5%; top:54%;">15</div>

<div class="card" style="left:46.5%; top:54%;">16</div>
<div class="card" style="left:54.5%; top:54%;">17</div>
<div class="card" style="left:62.5%; top:54%;">18</div>
<div class="card" style="left:70.5%; top:54%;">19</div>

<div class="card" style="left:78.5%; top:54%;">20</div>
</div>
<script>
document.querySelectorAll('.card').forEach(card => {

  let state = 0;

  card.addEventListener('click', () => {

    state++;

    if(state > 2){
      state = 0;
    }

    if(state === 0){
      card.textContent = '';
      card.style.background = 'transparent';
    }

    if(state === 1){
      card.textContent = '譲';
      card.style.background = 'rgba(255,0,0,0.7)';
    }

    if(state === 2){
      card.textContent = '求';
      card.style.background = 'rgba(0,100,255,0.7)';
    }

  });

});
</script>
</body>
</html>

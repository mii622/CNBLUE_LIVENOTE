<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グッズ交換画像ジェネレーター</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
  color:#222;
}

/* ===== ヘッダー ===== */
h2{
  text-align:center;
  font-size:20px;
  margin:20px 0 10px;
}

/* 説明 */
.subtext{
  max-width:700px;
  margin:0 auto 15px;
  padding:14px 16px;
  background:#fff;
  border-radius:12px;
  font-size:13px;
  line-height:1.6;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* ボタン */
.btn-area{
  text-align:center;
  margin-bottom:20px;
}

.saveBtn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

/* ===== セクション共通 ===== */
.item-section{
  position:relative;
  max-width:900px;
  margin:40px auto;
}

/* タイトル */
.section-title{
  position:absolute;
  top:10px;
  left:10px;
  font-size:13px;
  font-weight:600;
  background:rgba(255,255,255,0.85);
  padding:4px 10px;
  border-radius:8px;
  z-index:10;
  pointer-events:none;
}

/* 保存対象エリア */
.capture-area{
  position:relative;
  width:100%;
}

/* 画像 */
.capture-area img{
  width:100%;
  display:block;
}

/* カード */
.card{
  position:absolute;
  width:8%;
  height:16%;
  cursor:pointer;
  background:transparent;
}

/* ラベル */
.mark{
  position:absolute;
  font-size:12px;
  font-weight:bold;
  color:#fff;
  padding:2px 8px;
  border-radius:12px;
  white-space:nowrap;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
}

.give{ background:#e53935; }
.want{ background:#1e88e5; }

</style>
</head>

<body>

<h2>グッズ交換ジェネレーター</h2>

<div class="subtext">
① タップで「譲 → 求 → クリア」<br>
② 保存ボタンで画像化<br>
③ SNS投稿OK
</div>

<div class="btn-area">
  <button class="saveBtn">画像を保存</button>
</div>

<!-- ===================== -->
<!-- トレカ -->
<!-- ===================== -->
<div class="item-section">

  <div class="section-title">トレカ</div>

  <div class="capture-area">

    <img src="bandkingdom.jpg" crossorigin="anonymous">

    <div class="card" style="left:10%; top:20%;"></div>
    <div class="card" style="left:20%; top:20%;"></div>
    <div class="card" style="left:30%; top:20%;"></div>

  </div>
</div>

<!-- ===================== -->
<!-- 缶バッジ -->
<!-- ===================== -->
<div class="item-section">

  <div class="section-title">缶バッジ</div>

  <div class="capture-area">

    <img src="canbadge.jpg" crossorigin="anonymous">

    <div class="card" style="left:15%; top:30%;"></div>
    <div class="card" style="left:25%; top:30%;"></div>

  </div>
</div>

<!-- ===================== -->
<!-- キーホルダー -->
<!-- ===================== -->
<div class="item-section">

  <div class="section-title">キーホルダー</div>

  <div class="capture-area">

    <img src="keyholder.jpg" crossorigin="anonymous">

    <div class="card" style="left:15%; top:40%;"></div>
    <div class="card" style="left:35%; top:40%;"></div>

  </div>
</div>

<script>
/* =========================
   カード状態管理（共通）
========================= */
document.querySelectorAll('.card').forEach(card => {

  card.dataset.state = "0";

  card.addEventListener('click', () => {

    let state = Number(card.dataset.state);
    state = (state + 1) % 3;

    card.dataset.state = state;
    card.innerHTML = '';

    if(state === 1){
      const m = document.createElement('span');
      m.className = 'mark give';
      m.textContent = '譲';
      card.appendChild(m);
    }

    if(state === 2){
      const m = document.createElement('span');
      m.className = 'mark want';
      m.textContent = '求';
      card.appendChild(m);
    }

  });

});

/* =========================
   保存（セクション単位）
========================= */
document.querySelectorAll('.saveBtn').forEach(btn => {

  btn.addEventListener('click', async () => {

    const section = btn.closest('.item-section');
    const target = section.querySelector('.capture-area');

    const canvas = await html2canvas(target, {
      backgroundColor: null,
      scale: window.devicePixelRatio * 2,
      useCORS: true
    });

    const link = document.createElement('a');
    link.download = 'goods.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

  });

});
</script>

</body>
</html>

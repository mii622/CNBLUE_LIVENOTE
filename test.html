<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランダムグッズ　交換探し用画像作成</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
  color:#222;
}

/* ===== タイトル ===== */
h2{
  text-align:center;
  font-size:20px;
  font-weight:700;
  margin:20px 0 10px;
  letter-spacing:1px;
}

/* ===== 説明カード ===== */
.subtext{
  max-width:700px;
  margin:0 auto 15px;
  padding:14px 16px;
  border-radius:12px;
  background:#fff;
  font-size:13px;
  line-height:1.7;
  color:#333;
  width:calc(100% - 32px);
  box-sizing:border-box;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* ===== ボタン ===== */
.btn-area{
  text-align:center;
  margin-bottom:20px;
}

.saveBtn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

/* ===== セクション ===== */
.section{
  position:relative;
  max-width:900px;
  margin:0 auto 40px;
  display:inline-block; /* ★追加 */
}

/* 左上タイトル */
.section-title{
  position:absolute;
  top:10px;
  left:10px;

  font-size:13px;
  font-weight:600;
  letter-spacing:1px;

  background:rgba(255,255,255,0.85);
  padding:4px 10px;
  border-radius:8px;

  z-index:10;
  pointer-events:none;
}

/* ===== トレカ本体 ===== */
.wrapper{
  position:relative;
  width:100%;
}

.wrapper img{
  width:100%;
  display:block;
}

/* カード */
.card{
  position:absolute;
  width:8%;
  height:16%;
  background:transparent;
  cursor:pointer;
}

/* ラベル */
.mark{
  padding:2px 8px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  color:#fff;
  white-space:nowrap;
}

.give{ background:#e53935; }
.want{ background:#1e88e5; }

/* 上段 */
.top-card .mark{
  position:absolute;
  right:0px;
  top:-18px;
}

/* 下段 */
.bottom-card .mark{
  position:absolute;
  right:2px;
  bottom:-18px;
}

</style>
</head>

<body>

<h2>ランダムグッズ　交換探し用画像作成</h2>

<div class="subtext">
交換探し用の画像を作成できます<br>
① カードをタップで「譲 → 求 → クリア」切り替え<br>
② [画像を保存]ボタンで端末に画像が保存されます<br>
③ そのままSNSに投稿してOK!
</div>

<div class="btn-area">
  <button class="saveBtn">トレカを保存</button>
</div>

<!-- ===== トレカセクション ===== -->
<div class="section">

  <div class="section-title">トレカ</div>

  <div class="wrapper">

    <img src="bandkingdom.jpg" crossorigin="anonymous" alt="トレカ">

    <!-- 上段 1～11 -->
    <div class="card top-card" style="left:7.5%; top:16%;"></div>
    <div class="card top-card" style="left:15.5%; top:16%;"></div>
    <div class="card top-card" style="left:23.5%; top:16%;"></div>
    <div class="card top-card" style="left:31.5%; top:16%;"></div>
    <div class="card top-card" style="left:39.5%; top:16%;"></div>

    <div class="card top-card" style="left:47.5%; top:16%;"></div>
    <div class="card top-card" style="left:55.5%; top:16%;"></div>
    <div class="card top-card" style="left:62.5%; top:16%;"></div>
    <div class="card top-card" style="left:70.5%; top:16%;"></div>
    <div class="card top-card" style="left:78.5%; top:16%;"></div>
    <div class="card top-card" style="left:86.5%; top:16%;"></div>

    <!-- 下段 12～20 -->
    <div class="card bottom-card" style="left:14.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:22.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:30.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:38.5%; top:54%;"></div>

    <div class="card bottom-card" style="left:46.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:54.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:62.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:70.5%; top:54%;"></div>
    <div class="card bottom-card" style="left:78.5%; top:54%;"></div>

  </div>
</div>

<script>
/* ===== カード状態管理 ===== */
document.querySelectorAll('.card').forEach(card => {

  card.dataset.state = "0";

  card.addEventListener('click', () => {

    let state = Number(card.dataset.state);
    state = (state + 1) % 3;

    card.dataset.state = state;
    card.innerHTML = '';

    if(state === 1){
      const mark = document.createElement('span');
      mark.className = 'mark give';
      mark.textContent = '譲';
      card.appendChild(mark);
    }

    if(state === 2){
      const mark = document.createElement('span');
      mark.className = 'mark want';
      mark.textContent = '求';
      card.appendChild(mark);
    }

  });

});

/* ===== 画像保存（セクション単位対応） ===== */
document.querySelectorAll('.saveBtn').forEach(btn => {

  btn.addEventListener('click', async () => {

    const section = btn.closest('.section');

    const canvas = await html2canvas(section, {
      backgroundColor: null,
      scale: window.devicePixelRatio * 2,
      useCORS: true
    });

    const link = document.createElement('a');
    link.download = 'tradingcards.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

  });

});
</script>

</body>
</html>

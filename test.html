<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>座標テスト</title>

<style>
body{
  margin:20px;
  font-family:sans-serif;
}

.wrapper{
  position:relative;
  max-width:800px;
  margin:auto;
}

.wrapper img{
  width:100%;
  display:block;
}

/* タップエリア */
.card{
  position:absolute;
  width:12%;
  height:18%;
  background:red;
  opacity:0.4;
  border:2px solid #fff;
  box-sizing:border-box;
}

/* 番号表示 */
.card::after{
  content:attr(data-num);
  color:white;
  font-weight:bold;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<h2>トレカ座標テスト</h2>

<div class="wrapper">

  <img src="bandkingdom.jpg" alt="トレカ">

  <!-- とりあえず5枚だけ -->

  <div class="card" data-num="1"
       style="left:5%; top:5%;"></div>

  <div class="card" data-num="2"
       style="left:23%; top:5%;"></div>

  <div class="card" data-num="3"
       style="left:41%; top:5%;"></div>

  <div class="card" data-num="4"
       style="left:59%; top:5%;"></div>

  <div class="card" data-num="5"
       style="left:77%; top:5%;"></div>

</div>

</body>
</html>

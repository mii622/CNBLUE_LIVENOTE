<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOODS CALCULATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: #0b1b2b;
  color: #fff;
}

/* メイン */
.wrap {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  padding-bottom: 110px; /* 固定バー対策 */
}

.title {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* カード */
.card {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 14px;
}

.card-title {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 15px;
}

/* 行 */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
}

/* 商品名 */
.label {
  font-size: 14px;
}

.sub {
  font-size: 11px;
  opacity: 0.6;
}

/* 価格 */
.price {
  font-size: 12px;
  opacity: 0.7;
  margin-left: 6px;
}

/* 数量UI */
.counter {
  display: flex;
  align-items: center;
  gap: 6px;
}

button {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 6px;
  background: #1d3b5a;
  color: #fff;
  font-size: 16px;
}

input[type="number"] {
  width: 50px;
  text-align: center;
  border-radius: 6px;
  border: none;
  padding: 4px;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

/* 固定合計バー */
.total {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 999;

  background: #142b45;
  text-align: center;

  padding: 16px;
  font-size: 18px;
  font-weight: bold;

  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}

#total {
  font-size: 22px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="title">GOODS CALCULATOR</div>

  <!-- Tシャツ -->
  <div class="card">
    <div class="card-title">Tシャツ</div>

    <div class="row">
      <div>
        <div class="label">WHITE</div>
        <div class="sub">2025 TOUR</div>
      </div>
      <div class="price">¥5,000</div>

      <div class="counter">
        <button onclick="changeQty(this, -1)">−</button>
        <input type="number" value="0" min="0" data-price="5000" oninput="calc()">
        <button onclick="changeQty(this, 1)">＋</button>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="label">BLACK</div>
        <div class="sub">2025 TOUR</div>
      </div>
      <div class="price">¥5,000</div>

      <div class="counter">
        <button onclick="changeQty(this, -1)">−</button>
        <input type="number" value="0" min="0" data-price="5000" oninput="calc()">
        <button onclick="changeQty(this, 1)">＋</button>
      </div>
    </div>
  </div>

  <!-- タオル -->
  <div class="card">
    <div class="card-title">タオル</div>

    <div class="row">
      <div>
        <div class="label">LOGO</div>
        <div class="sub">TOUR GOODS</div>
      </div>
      <div class="price">¥3,500</div>

      <div class="counter">
        <button onclick="changeQty(this, -1)">−</button>
        <input type="number" value="0" min="0" data-price="3500" oninput="calc()">
        <button onclick="changeQty(this, 1)">＋</button>
      </div>
    </div>
  </div>

  <!-- アクキー -->
  <div class="card">
    <div class="card-title">アクリルキーホルダー</div>

    <div class="row">
      <div>
        <div class="label">TOUR LOGO</div>
        <div class="sub">LIMITED</div>
      </div>
      <div class="price">¥1,200</div>

      <div class="counter">
        <button onclick="changeQty(this, -1)">−</button>
        <input type="number" value="0" min="0" data-price="1200" oninput="calc()">
        <button onclick="changeQty(this, 1)">＋</button>
      </div>
    </div>
  </div>

</div>

<!-- 固定合計 -->
<div class="total">
  TOTAL：<span id="total">0</span>円
</div>

<script>
function changeQty(btn, diff) {
  const input = btn.parentElement.querySelector('input');
  let val = Number(input.value || 0);
  val = Math.max(0, val + diff);
  input.value = val;
  calc();
}

function calc() {
  let total = 0;

  document.querySelectorAll('input[type="number"]').forEach(input => {
    const qty = Number(input.value || 0);
    const price = Number(input.dataset.price || 0);
    total += qty * price;
  });

  const el = document.getElementById('total');
  el.textContent = total.toLocaleString();

  // 軽いアニメ
  el.style.transform = "scale(1.1)";
  setTimeout(() => el.style.transform = "scale(1)", 120);
}

// 初期計算
calc();
</script>

</body>
</html>

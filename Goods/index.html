body {
  font-family: 'Noto Sans JP', sans-serif;
  margin: 0;
  background:  linear-gradient(180deg, #f9fafc 0%, #f5f7ff 100%);
}

/* =====================
   HEADER
===================== */
.header {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  text-align: center;
  padding: 14px 0;
  color: #6b7cff;
}

.header::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  background: #6b7cff;
  margin: 8px auto 0;
  border-radius: 2px;
  opacity: 0.6;
}

/* =====================
   CONTAINER
===================== */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px 16px;
}

/* =====================
   SECTION
===================== */
.section {
  color: #6b7cff;
  font-weight: 600;
  font-size: 12px;
  margin: 22px 4px 10px;
  border-left: 4px solid #6b7cff;
  padding-left: 6px;
}
/* グリッド */
.grid{
  display:grid;
  grid-template-columns:1fr; /* 明示しとくと安定 */
  max-width:600px;
  margin:0 auto;
  padding:20px;
  gap:16px;
}

/* カード */
.card{
  background:rgba(255,255,255,0.92);
  border-radius:18px;
  overflow:hidden;
  text-decoration:none;
  color:#000;
  transition:0.15s;
  backdrop-filter:blur(6px);
  box-shadow:
    0 4px 10px rgba(0,0,0,0.08),
    0 10px 22px rgba(0,0,0,0.12);
}

.card:active{
  transform:scale(0.97);
}

/* 画像 */
  .card img{
  width:100%;
  height:auto;
  display:block;
}
/* テキスト */
.card-body{
  padding:10px 12px;
}

.card-title{
  font-size:0.9rem;;
  font-weight:500;
}

.new{
  background:rgba(48,105,166,0.15);
  color:#3069a6;
  font-size:0.65rem;
  padding:2px 6px;
  border-radius:999px;
  margin-left:6px;
}

.section-title{
  color:#ffffff;
  font-size:1.1rem;
  letter-spacing:1px;
  margin:10px 5px 0;
}

/* フッター固定ボタン */
.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#3069a6;
  padding:10px;
  text-align:center;
  border-bottom:none;
  backdrop-filter:blur(16px);
  box-shadow: 0 -2px 6px rgba(0,0,0,0.2);
  background:rgba(255,255,255,0.2);
}

.home-btn{
  background:transparent;
  color:#fff;
  border:1.5px solid #fff;
  padding:6px 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:0.9rem;
}

<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description"
content="CNBLUEおすすめ曲診断。自分にぴったりの曲が見つかる。">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-QZG2G4761S"></script>

<title>CNBLUE 曲診断</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<!-- アイコン -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<link rel="stylesheet" href="style.css">

<meta property="og:title" content="CNBLUEおすすめ曲診断">
<meta property="og:description" content="今の気分にぴったりなCNBLUEを見つけよう">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mii622.github.io/CNBLUE_LIVENOTE/diagnosis/">
<meta property="og:image" content="https://mii622.github.io/CNBLUE_LIVENOTE/diagnosis/images/ogp.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="CNBLUEおすすめ曲診断">
<meta name="twitter:description" content="今の気分にぴったりなCNBLUEを見つけよう">
<meta name="twitter:image" content="https://mii622.github.io/CNBLUE_LIVENOTE/diagnosis/images/ogp.jpg">

</head>

<body>
  <div id="header"></div>

  <div class="page-header">CNBLUE for Your Mood</div>

  <h1 class="main-title" id="mainTitle">
CNBLUEおすすめ曲診断
</h1>
<div class="lang-switch">

  <button class="lang-btn"
  onclick="setLanguage('ja')">
    日本語
  </button>

  <button class="lang-btn"
  onclick="setLanguage('ko')">
    한국어
  </button>

</div>
<p class="site-subtitle" id="siteSubtitle">
今の気分にぴったりな
CNBLUEを見つけよう
</p>
 

<div class="quiz-container">

  <!-- progress -->
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- questions -->
  <div class="question-wrapper" id="questionWrapper">

    <!-- Q1 -->
    <section class="question">

      <div class="question-card">

        <p class="question-number">
          Q1 / 5
        </p>

        <h2 id="q1Title">
          ライブで一番浴びたいのは？
        </h2>

        <div class="choices">

          <label>
            <input type="radio" name="q1"
            value="hype"
            data-point="1">
            <span id="q1c1">パワフルなエネルギー</span>
          </label>

          <label>
            <input type="radio" name="q1"
            value="band"
            data-point="1">
            <span id="q1c2">圧倒的な演奏力</span>
          </label>

          <label>
            <input type="radio" name="q1"
            value="emo"
            data-point="1">
            <span id="q1c3">世界観に浸れる空気感</span>
          </label>

          <label>
            <input type="radio" name="q1"
            value="soft"
            data-point="1">
            <span id="q1c4">優しく包み込むような温かさ</span>
          </label>

          <label>
            <input type="radio" name="q1"
            value="support"
            data-point="1">
            <span id="q1c5">前向きになれる明るさ</span>
          </label>

          <label>
            <input type="radio" name="q1"
            value="happy"
            data-point="1">
            <span id="q1c6">わちゃわちゃした多幸感</span>
          </label>

        </div>

      </div>

    </section>

    <!-- Q2 -->
    <section class="question">

      <div class="question-card">

        <p class="question-number">
          Q2 / 5
        </p>

        <h2 id="q2Title">
          どんなときに音楽を聴きたい？
        </h2>

        <div class="choices">

          <label>
            <input type="radio" name="q2"
            value="hype"
            data-point="1">
            <span id="q2c1">気分を上げたいとき</span>
          </label>

          <label>
            <input type="radio" name="q2"
            value="soft"
            data-point="1">
            <span id="q2c2">ゆっくりリラックスしたいとき</span>
          </label>

          <label>
            <input type="radio" name="q2"
            value="emo"
            data-point="1">
            <span id="q2c3">集中したいとき</span>
          </label>

          <label>
            <input type="radio" name="q2"
            value="support"
            data-point="1">
            <span id="q2c4">自分を励ましたいとき</span>
          </label>

          <label>
            <input type="radio" name="q2"
            value="band"
            data-point="1">
            <span id="q2c5">リズムやサウンドそのものを楽しみたいとき</span>
          </label>

        </div>

      </div>

    </section>
    <!-- Q3 -->
<section class="question">

  <div class="question-card">

    <p class="question-number">
      Q3 / 5
    </p>

    <h2 id="q3Title">
      曲を聴くときに一番何を楽しむ？
    </h2>

    <div class="choices">

      <label>
        <input type="radio" name="q3"
        value="support"
        data-point="2">
        <span id="q3c1">歌詞</span>
      </label>

      <label>
        <input type="radio" name="q3"
        value="happy"
        data-point="2">
        <span id="q3c2">メロディ</span>
      </label>

      <label>
        <input type="radio" name="q3"
        value="band"
        data-point="2">
        <span id="q3c3">ベースやドラムなど楽器のサウンド</span>
      </label>

      <label>
        <input type="radio" name="q3"
        value="hype"
        data-point="2">
        <span id="q3c4">ライブ感、ノリ</span>
      </label>

      <label>
        <input type="radio" name="q3"
        value="emo"
        data-point="2">
        <span id="q3c5">世界観</span>
      </label>
  
      <label>
        <input type="radio" name="q3"
        value="soft"
        data-point="2">
        <span id="q3c6">歌声のあたたかさ</span>
      </label>

    </div>

  </div>

</section>

<!-- Q4 -->
<section class="question">

  <div class="question-card">

    <p class="question-number">
      Q4 / 5
    </p>

    <h2 id="q4Title">
      今の気分に一番近いのは？
    </h2>

    <div class="choices">

      <label>
        <input type="radio" name="q4"
        value="hype"
        data-point="3">
        <span id="q4c1">テンション上げたい</span>
      </label>

      <label>
        <input type="radio" name="q4"
        value="emo"
        data-point="3">
        <span id="q4c2">静かに浸りたい</span>
      </label>

      <label>
        <input type="radio" name="q4"
        value="support"
        data-point="3">
        <span id="q4c3">誰かに応援してほしい</span>
      </label>

      <label>
        <input type="radio" name="q4"
        value="happy"
        data-point="3">
        <span id="q4c4">幸せいっぱいになりたい</span>
      </label>

      <label>
        <input type="radio" name="q4"
        value="soft"
        data-point="3">
        <span id="q4c5">穏やかに過ごしたい</span>
      </label>

      <label>
        <input type="radio" name="q4"
        value="band"
        data-point="3">
        <span id="q4c6">ライブ感を味わいたい</span>
      </label>

    </div>

  </div>

</section>

<!-- Q5 -->
<section class="question">

  <div class="question-card">

    <p class="question-number">
      Q5 / 5
    </p>

    <h2 id="q5Title">
      CNBLUEの魅力、何が一番気になる？
    </h2>

    <div class="choices">

      <label>
        <input type="radio" name="q5"
        value="band"
        data-point="2">
        <span id="q5c1">幅広いサウンド</span>
      </label>

      <label>
        <input type="radio" name="q5"
        value="emo"
        data-point="2">
        <span id="q5c2">深い表現力</span>
      </label>

      <label>
        <input type="radio" name="q5"
        value="hype"
        data-point="2">
        <span id="q5c3">疾走感溢れる演奏</span>
      </label>

      <label>
        <input type="radio" name="q5"
        value="support"
        data-point="2">
        <span id="q5c4">寄り添ってくれる歌詞</span>
      </label>

      <label>
        <input type="radio" name="q5"
        value="soft"
        data-point="2">
        <span id="q5c5">甘い歌声</span>
      </label>

      <label>
        <input type="radio" name="q5"
        value="happy"
        data-point="2">
        <span id="q5c6">3人のわちゃわちゃした雰囲気</span>
      </label>

    </div>

  </div>

</section>

  </div>

  <!-- buttons -->
  <div class="button-area">

    <button id="prevBtn">
      ← 戻る
    </button>

    <button id="nextBtn">
      次へ →
    </button>

  </div>

</div>

<!-- result -->

<div class="result-container" id="resultContainer">

  <div class="result-card">

    <p class="result-sub" id="resultSub">
      診断結果
    </p>

    <h2 id="resultTitle"></h2>

    <div id="resultBlocks"></div>

    <div class="share-area">

<button id="shareBtn">
<i class="fa-brands fa-x-twitter"></i>

<span id="shareText">
診断結果をシェア
</span>

</button>

  <button id="restartBtn">
    ↻ 診断トップに戻る
  </button>

</div>
  </div>

</div>

<script src="script.js"></script>
<script>
fetch("../header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
</body>
</html>

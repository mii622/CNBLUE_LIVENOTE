<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>持ち物リスト</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Sans JP',sans-serif;
background:linear-gradient(180deg,#f9fafc,#f5f7ff);
margin:0;
padding:20px;
color:#1e242a;
}

.container{
max-width:800px;
margin:auto;
}

.title-box{
text-align:center;
margin-bottom:25px;
}

.page-label{
font-size:14px;
letter-spacing:3px;
color:#6b7cff;
font-weight:bold;
}

.title{
font-size:28px;
font-weight:800;
margin-top:10px;
}


.card{

background:white;
border-radius:16px;
padding:22px;
margin-bottom:18px;

box-shadow:
0 10px 24px rgba(0,0,0,.06);

}


.card h2{

font-size:16px;
border-left:5px solid #6b7cff;
padding-left:10px;

}



.check-list{

display:flex;
flex-direction:column;
gap:10px;
margin-top:15px;

}


.check-item{

display:flex;
justify-content:space-between;
align-items:center;

font-size:15px;

}


.check-left{

display:flex;
align-items:center;
gap:10px;

}


.check-left input{

width:18px;
height:18px;
accent-color:#0c6bca;

}



.delete-btn{

border:none;
background:#eef4ff;
color:#6b7cff;

width:24px;
height:24px;

border-radius:50%;

}



.add-area{

display:flex;
gap:8px;
margin-top:18px;

}


input{

flex:1;

border:none;

background:#f3f6fb;

padding:10px;

border-radius:10px;

}



button{

cursor:pointer;

}



.add-btn{

border:none;

background:#1492ff;

color:white;

padding:10px 14px;

border-radius:10px;

}



.create-btn{

border:none;

background:linear-gradient(135deg,#6b7cff,#a9c8ff);

color:white;

padding:10px 18px;

border-radius:999px;

}



.list-card{

background:#f8fbff;

padding:14px;

border-radius:12px;

margin-top:10px;

cursor:pointer;

display:flex;

justify-content:space-between;

}



.open-area{

display:none;

margin-top:20px;

}



.save-text{

font-size:11px;
color:#888;

}

</style>

</head>


<body>


<div class="container">


<div class="title-box">

<div class="page-label">
PACKING LIST
</div>

<div class="title">
持ち物リスト
</div>

</div>




<!-- 基本セット -->

<div class="card">

<h2>基本セット</h2>

<div id="basicList"
class="check-list"></div>


<div class="add-area">

<input id="basicInput"
placeholder="基本セットに追加">

<button class="add-btn"
id="basicAdd">
＋追加
</button>

</div>


</div>




<!-- 新規作成 -->

<div class="card">

<h2>新しいリストを作成</h2>

<div class="add-area">

<input id="newListName"
placeholder="例：サマソニ2026">

<button class="create-btn"
id="createBtn">
作成
</button>

</div>

</div>




<!-- 作成済み -->

<div class="card">

<h2>作成したリスト</h2>

<div id="lists"></div>


<div id="openArea"
class="open-area">


<h2 id="openTitle"></h2>


<div id="openList"
class="check-list"></div>


<div class="add-area">

<input id="itemInput"
placeholder="持ち物を追加">


<button class="add-btn"
id="itemAdd">
＋追加
</button>

</div>


</div>


</div>



<p class="save-text">
※このリストは端末内に保存されます
</p>


</div>



<script>


let basicItems =
JSON.parse(
localStorage.getItem("packing_basic")
)
||
[
"スマホ",
"現金",
"ペンライト",
"モバイルバッテリー",
"ペンラの電池"
]
.map(text=>({
text,
checked:false
}));



let lists =
JSON.parse(
localStorage.getItem("packing_lists")
)
||
[];



let currentId=null;



function save(){

localStorage.setItem(
"packing_basic",
JSON.stringify(basicItems)
);


localStorage.setItem(
"packing_lists",
JSON.stringify(lists)
);

}




// 基本セット表示

function renderBasic(){

const area=
document.getElementById("basicList");

area.innerHTML="";


basicItems.forEach((item,index)=>{


area.innerHTML += `

<div class="check-item">

<span>
${item.text}
</span>


<button class="delete-btn"
onclick="deleteBasic(${index})">
×
</button>


</div>

`;

});

}



function deleteBasic(index){

basicItems.splice(index,1);

save();

renderBasic();

}



// 基本追加

document
.getElementById("basicAdd")
.onclick=()=>{


let input=
document.getElementById("basicInput");


let text=input.value.trim();


if(!text)return;


basicItems.push({

text,

checked:false

});


input.value="";


save();

renderBasic();


};




// 新規作成

document
.getElementById("createBtn")
.onclick=()=>{


let name=
document
.getElementById("newListName")
.value.trim();


if(!name)return;



let id=
"custom_"
+Date.now();



lists.push({

id:id,

name:name,

type:"custom",

items:
JSON.parse(
JSON.stringify(basicItems)
)

});



document
.getElementById("newListName")
.value="";


save();

renderLists();



};




// 一覧

function renderLists(){

let area=
document.getElementById("lists");

area.innerHTML="";


lists.forEach(list=>{


let div=
document.createElement("div");


div.className="list-card";


div.innerHTML=`

<span>${list.name}</span>

<span class="toggle">
${currentId === list.id ? "−" : "＋"}
</span>

`;


div.onclick=()=>openList(list.id);



area.appendChild(div);


});


}



// 開く

function openList(id){


// すでに開いているものを押したら閉じる

if(currentId === id){

currentId=null;

document
.getElementById("openArea")
.style.display="none";


renderLists();

return;

}


currentId=id;


let list=
lists.find(
x=>x.id===id
);


document
.getElementById("openArea")
.style.display="block";


document
.getElementById("openTitle")
.innerHTML=
list.name;



renderOpen(list);
renderLists();

}




function renderOpen(list){

let area=
document.getElementById("openList");

area.innerHTML="";


list.items.forEach((item,index)=>{


let div=
document.createElement("div");


div.className="check-item";


div.innerHTML=`

<label class="check-left">

<input type="checkbox"
${item.checked?"checked":""}>

<span>${item.text}</span>

</label>


<button class="delete-btn">
×
</button>

`;



div.querySelector("input")
.onchange=e=>{

item.checked=e.target.checked;

save();

};



div.querySelector(".delete-btn")
.onclick=()=>{

list.items.splice(index,1);

save();

renderOpen(list);

};



area.appendChild(div);


});


}




// リスト追加

document
.getElementById("itemAdd")
.onclick=()=>{


let input=
document.getElementById("itemInput");


let text=
input.value.trim();


if(!text)return;



let list=
lists.find(
x=>x.id===currentId
);


list.items.push({

text,

checked:false

});


input.value="";


save();

renderOpen(list);


};




renderBasic();

renderLists();


</script>


</body>
</html>

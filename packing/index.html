<h2>

    ・すべての持ち物リストに共通して入れたいアイテムをセットできます<br>

  <!-- ✔ 共通ヘッダー読み込み -->
<script>

  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });

<script>


// ==========================
// データ読み込み
// ==========================


// 基本セット
let savedBasic =
JSON.parse(
localStorage.getItem("packing_basic")
);


let basicItems =
savedBasic
?
savedBasic.map(item =>
  typeof item === "string"
  ? item
  : item.text
)
:
[
"スマホ",
"現金",
"ペンライト",
"モバイルバッテリー",
"ペンラの電池"
];


// 作成リスト
let lists =
JSON.parse(
localStorage.getItem("packing_lists")
)
||
[];



// 現在開いているリスト
let currentId = null;




// ==========================
// 保存
// ==========================


function save(){

localStorage.setItem(
"packing_basic",
JSON.stringify(basicItems)
);


localStorage.setItem(
"packing_lists",
JSON.stringify(lists)
);

}



// ==========================
// 基本セット表示
// ==========================


function renderBasic(){


const area =
document.getElementById("basicList");


area.innerHTML="";


basicItems.forEach((item,index)=>{


const div =
document.createElement("div");


div.className="check-item";


div.innerHTML=`

<span>
${item}
</span>

<button
class="delete-btn">

×

</button>

`;



div.querySelector(".delete-btn")
.onclick=()=>{


basicItems.splice(index,1);


save();


renderBasic();


};



area.appendChild(div);


});


}




// ==========================
// 基本セット追加
// ==========================


document
.getElementById("basicAdd")
.onclick=()=>{


const input =
document.getElementById("basicInput");


const text =
input.value.trim();


if(!text)return;



basicItems.push(text);



input.value="";


save();


renderBasic();


};





// ==========================
// 新規リスト作成
// ==========================


document
.getElementById("createBtn")
.onclick=()=>{


const input =
document.getElementById("newListName");


const name =
input.value.trim();



if(!name)return;




lists.push({

id:
"custom_"
+
Date.now(),


name:name,


// 個別追加分だけ保存

items:[],


// 基本セットのチェック状態

checked:{}


});



input.value="";


save();


renderLists();


};






// ==========================
// リスト一覧表示
// ==========================


function renderLists(){


const area =
document.getElementById("lists");


area.innerHTML="";



lists.forEach(list=>{


const div =
document.createElement("div");


div.className="list-card";


div.innerHTML=`

<span>
${list.name}
</span>

<div style="display:flex;align-items:center;gap:10px;">

<button
class="delete-btn list-delete">

<i class="fa-solid fa-trash"></i>

</button>

<span class="toggle">

${currentId === list.id ? "−" : "＋"}

</span>

</div>

`;
const deleteBtn =
div.querySelector(".list-delete");

deleteBtn.onclick=(e)=>{

  e.stopPropagation();

  if(!confirm("このリストを削除しますか？")){
    return;
  }

  lists = lists.filter(
    x => x.id !== list.id
  );

  // 開いていたリストなら閉じる
  if(currentId === list.id){
    currentId = null;
    document.getElementById("openArea").style.display = "none";
  }

  save();
  renderLists();

};
  
div.onclick=()=>{


if(currentId === list.id){


currentId=null;


document
.getElementById("openArea")
.style.display="none";


renderLists();


return;


}



openList(list.id);


};



area.appendChild(div);



});


}






// ==========================
// リストを開く
// ==========================


function openList(id){


currentId=id;



const list =
lists.find(
x=>x.id===id
);



document
.getElementById("openArea")
.style.display="block";



document
.getElementById("openTitle")
.textContent =
list.name;



renderOpen(list);


renderLists();



}





// ==========================
// 開いたリスト表示
// ==========================


function renderOpen(list){



const area =
document.getElementById("openList");


area.innerHTML="";



// 基本セット + 個別追加

const displayItems = [];



// 基本セット

basicItems.forEach(text=>{


displayItems.push({

text:text,

type:"basic",

checked:
list.checked[text]
||
false

});


});



// 個別追加

list.items.forEach(item=>{


displayItems.push({

text:item.text,

type:"custom",

checked:item.checked

});


});






displayItems.forEach((item,index)=>{


const div =
document.createElement("div");


div.className="check-item";



div.innerHTML=`

<label class="check-left">


<input type="checkbox"
${item.checked ? "checked":""}>


<span>
${item.text}
</span>


</label>


${
item.type==="custom"

?

`
<button class="delete-btn">
×
</button>
`

:

""

}


`;





// チェック変更

div.querySelector("input")
.onchange=(e)=>{


if(item.type==="basic"){


list.checked[item.text]
=
e.target.checked;


}else{


// 個別アイテムの更新

let target =
list.items.find(
x=>x.text===item.text
);


if(target){

target.checked =
e.target.checked;

}



}



save();


};





// 個別削除

const del =
div.querySelector(".delete-btn");


if(del){


del.onclick=()=>{


list.items =
list.items.filter(
x=>x.text!==item.text
);


save();


renderOpen(list);


};


}




area.appendChild(div);



});



}






// ==========================
// 個別アイテム追加
// ==========================


document
.getElementById("itemAdd")
.onclick=()=>{


if(!currentId)return;



const input =
document.getElementById("itemInput");


const text =
input.value.trim();


if(!text)return;




const list =
lists.find(
x=>x.id===currentId
);



list.items.push({

text:text,

checked:false

});



input.value="";



save();


renderOpen(list);



};





// 初期表示

renderBasic();

renderLists();



</script>

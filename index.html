<style>

/* =====================
   BASE
===================== */
body {
  font-family: 'Noto Sans JP', sans-serif;
  margin: 0;https://github.com/mii622/CNBLUE_LIVENOTE/edit/main/index.html
  background: linear-gradient(180deg, #f9fafc 0%, #f5f7ff 100%); 
}

a {
  text-decoration: none;
  color: inherit;
}

/* =====================
   HEADER
===================== */
   .header {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  text-align: center;
  padding: 14px 0;
  color: #6b7cff;
  position: relative;
}

/* 下のライン（締まり） */
.header::after {
  content: "";
  display: block;
  width: 40px;
  height: 2px;
  background: #6b7cff;
  margin: 8px auto 0;
  border-radius: 2px;
  opacity: 0.6;
}


/* =====================
   CONTAINER
===================== */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px 16px;
}

/* =====================
   HERO
===================== */
.hero img {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 12px;
}

/* =====================
   SECTION TITLE
===================== */
.section {
  margin-top: 28px;
  margin-bottom: 8px;
  padding-left: 4px;
  color: #6b7cff;
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 12px;
  margin: 22px 4px 10px;
  border-left: 4px solid #6b7cff;
  letter-spacing: 1px;
}
   .section + .card {

  margin-top: 8px;

}

/* =====================
   CARD（共通）
===================== */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.04);
  overflow: hidden;
  margin-bottom: 12px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.card-body {
  padding: 12px;
}

.title {
  font-size: 15px;
  font-weight: bold;
}

.sub {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* =====================
   LIVE IMAGE
===================== */
.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

/* リスト全体 */
.live-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.live-list:hover {
  transform: translateY(-2px);
}

/* 左画像（アイコン化） */
.live-list img {
  width: 228px;
  height: 128px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
}

/* 右テキスト */
.live-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
   .live-item {
  display: flex;
  align-items: center;
  gap: 12px;

  padding: 10px;
  border-radius: 12px;

  transition: 0.2s;
}

.live-item:hover {
  transform: translateX(4px);
  background: #eaf0ff;
}

.live-item img {
  width: 120px;
  height: 70px;

  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}

.live-text {
  display: flex;
  flex-direction: column;
}

/* 既存流用OK */
.title {
  font-size: 15px;
  font-weight: bold;
}

.sub {
  font-size: 12px;
  color: #666;
}

   .btn-outline {
  display: block;
  text-align: center;

  margin-top: 10px;
  padding: 10px 12px;

  border: 1px solid #2b5cff;
  color: #2b5cff;

  border-radius: 999px;

  font-size: 13px;
  font-weight: 600;

  transition: 0.2s;
}

.btn-outline:hover {
  background: #2b5cff;
  color: white;
}

/* =====================
   SMALL CARD
===================== */
.small-card {
  padding: 14px;
}

/* =====================
   LINK CARD
===================== */
.link-card {
  padding: 14px;
  font-weight: bold;
  text-align: center;
  color: #2b5cff;
}

/* =====================
   BADGE
===================== */
.badge {
  font-size: 11px;
  padding: 3px 6px;
  background: #e6f0ff;
  color: #2b5cff;
  border-radius: 6px;
  display: inline-block;
  margin-top: 6px;
}

/* =====================
   SNS
===================== */
.sns-text {
  font-size: 13px;
  color: #555;
  line-height: 1.6;
  margin-bottom: 12px;
}

/* ボタン */
.sns-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;

  background: #0F1419;
  color: white;

  padding: 10px 14px;
  border-radius: 999px;

  font-size: 13px;
  font-weight: 500;

  text-decoration: none;
  transition: 0.2s;
}

.sns-button:hover {
  transform: translateY(-2px);
  background: #000;
}

/* Xアイコン */
.sns-button i {
  font-size: 14px;
}

/* =====================
   SIDE MENU（左上）
===================== */
.nav-wrapper {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;
}
   .nav-icon {
  font-size: 22px;
  cursor: pointer;

  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(12px);

  padding: 6px 8px;
  border-radius: 10px;

  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  color: #333;

  transition: 0.2s;
}

#nav-toggle {
  display: none;
}

/* 背景 */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  opacity: 0;
  visibility: hidden;
  transition: 0.25s;
}

/* メニュー */
   .side-nav {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100%;
  padding: 70px 16px;
  box-shadow: 2px 0 20px rgba(0,0,0,0.08);
  transform: translateX(-100%);
  transition: 0.25s ease;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#nav-toggle:checked ~ .side-nav {
  transform: translateX(0);
}

#nav-toggle:checked ~ .overlay {
  opacity: 1;
  visibility: visible;
}

/* メニューリンク */
.side-nav a {
  padding: 10px;
  border-radius: 8px;
  font-weight: 500;
}

.side-nav a:hover {
  background: #f3f5ff;
}

/* アイコン */
.side-nav a i {
  margin-right: 10px;
  width: 18px;
}

</style>
</head>
